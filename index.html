<!DOCTYPE html>

<html lang = "en">
    <head>
        <meta charset = "UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>
            Weather App
        </title>
    </head>
    <body>
        <div class = "container">
            <div class = "weather-condition">
                <div class = "temp">
                    <p>20℃</p>
                </div>
                <div class = "time_location">
                    <p>Delhi</p>
                    <p>14:35 - Thursday 2026-03-20</p>
                </div>
                <div class = "condition">
                    <img>
                    <p>Mist</p>
                </div>
            </div>
        </div>
        <div>
            <form>
                <input type = "text" placeholder = "Search for a location" class = "search-bar">
                <button type = "submit">Search</button>
            </form>
        </div>
    </body>
</html>
