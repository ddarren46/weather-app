<!DOCTYPE html>

<html lang = "en">
    <head>
        <meta charset = "UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>
            Weather App
        </title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class = "container">
            <div class = "weather-condition">
                <div class = "temp">
                    <p>20℃</p>
                </div>
                <div class = "time_location">
                    <p class = "location">Delhi</p>
                    <p class = "time">14:35 - Thursday 2026-03-20</p>
                </div>
                <div class = "condition">
                    <img class = "weather-image">
                    <p class = "weather">Mist</p>
                </div>
            </div>
        </div>
        <div class = "search-place">
            <form class = "search-form">
                <input type = "text" placeholder = "Search for a location" class = "search-bar">
                <button type = "submit" class = "search-button">Search</button>
            </form>
        </div>
    </body>
    <script src = "script.js"></script>
</html>
